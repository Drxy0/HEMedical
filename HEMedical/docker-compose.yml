services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-CU5-ubuntu-24.04
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=HEMedical_SA_Password1
    ports:
      - "1433:1433"

  heserver:
    build:
      context: .
      dockerfile: HEMedical.HEServer/Dockerfile
    ports:
      - "5001:8080"
    environment:
      - HospitalsProxies__Urls__0=http://hospitalproxy:8080
    depends_on:
      - hospitalproxy

  hospitalproxy:
    build:
      context: .
      dockerfile: HEMedical.HospitalProxy/Dockerfile
    ports:
      - "5002:8080"
    environment:
      - HospitalBaseUrl=http://hospital:8080
    volumes:
      - ./HEMedical.HospitalProxy/public.key:/app/public.key:ro

  hospital:
    build:
      context: .
      dockerfile: HEMedical.Hospital/Dockerfile
    ports:
      - "5003:8080"
    environment:
      - Database__DefaultConnection=Server=sqlserver;Database=HospitalDb;User Id=sa;Password=HEMedical_SA_Password1;TrustServerCertificate=True;Encrypt=False;
    depends_on:
      - sqlserver

  client:
    build:
      context: .
      dockerfile: HEMedical.Client/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - HEServerBaseUrl=http://heserver:8080
      - HospitalBaseUrl=http://hospitalproxy:8080
    volumes:
      - ./HEMedical.Client/public.key:/app/public.key:ro
      - ./HEMedical.Client/secret.key:/app/secret.key:ro
    depends_on:
      - heserver
      - hospitalproxy
