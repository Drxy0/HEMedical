name: Build and deploy to AKS

# Builds the five images in ACR, then rolls them out to the AKS cluster.
# Assumes the infrastructure already exists (deploy/terraform applied once).
# Manual-only: run it from the Actions tab. The push trigger is intentionally
# disabled so pushing to main does not build/deploy automatically.
on:
  workflow_dispatch:

env:
  ACR_NAME: hemedicalacr # matches "${prefix}acr" from Terraform
  RESOURCE_GROUP: hemedical-rg # matches "${prefix}-rg"
  AKS_CLUSTER: hemedical-aks # matches "${prefix}-aks"
  NAMESPACE: hemedical

permissions:
  id-token: write # for azure/login via OIDC
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set image coordinates
        run: |
          echo "IMAGE_REGISTRY=${ACR_NAME}.azurecr.io" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      # az acr build builds the image in the registry — no local Docker needed.
      - name: Build images in ACR
        run: |
          az acr build -r "$ACR_NAME" -t hemedical-client:${IMAGE_TAG}        -f HEMedical/HEMedical.Client/Dockerfile        HEMedical
          az acr build -r "$ACR_NAME" -t hemedical-heserver:${IMAGE_TAG}      -f HEMedical/HEMedical.HEServer/Dockerfile      HEMedical
          az acr build -r "$ACR_NAME" -t hemedical-hospitalproxy:${IMAGE_TAG} -f HEMedical/HEMedical.HospitalProxy/Dockerfile HEMedical
          az acr build -r "$ACR_NAME" -t hemedical-hospital:${IMAGE_TAG}      -f HEMedical/HEMedical.Hospital/Dockerfile      HEMedical
          az acr build -r "$ACR_NAME" -t hemedical-frontend:${IMAGE_TAG}      -f client-frontend/Dockerfile                   client-frontend

      - name: Get AKS credentials
        run: az aks get-credentials --resource-group "$RESOURCE_GROUP" --name "$AKS_CLUSTER" --overwrite-existing

      - name: Render manifests and apply
        run: |
          for f in deploy/k8s/backend.yaml deploy/k8s/frontend.yaml; do
            envsubst < "$f" | kubectl apply -f -
          done
          kubectl apply -f deploy/k8s/ingress.yaml

      - name: Wait for rollouts
        run: |
          for d in client heserver hospitalproxy hospital frontend; do
            kubectl rollout status deployment/$d -n "$NAMESPACE" --timeout=180s
          done
