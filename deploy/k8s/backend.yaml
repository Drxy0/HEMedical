# Backend services. Only the Client is exposed publicly (via the Ingress);
# HEServer, HospitalProxy and Hospital are internal ClusterIP services.
#
# Image references use ${IMAGE_REGISTRY}/${IMAGE_TAG} placeholders rendered by
# `envsubst` in CI (see .github/workflows/deploy.yml) or manually per the README.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: hemedical
  labels: { app: client }
spec:
  replicas: 1
  selector:
    matchLabels: { app: client }
  template:
    metadata:
      labels: { app: client }
    spec:
      containers:
        - name: client
          image: ${IMAGE_REGISTRY}/hemedical-client:${IMAGE_TAG}
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: HEServerBaseUrl
              value: "http://heserver:8080"
            # PlainServerBaseUrl is deliberately absent: the PlainServer is a
            # verification/benchmark tool and is never deployed to production.
            - name: Loinc__BaseUrl
              value: "https://fhir.loinc.org/"
            - name: Loinc__Username
              valueFrom:
                secretKeyRef: { name: loinc-secret, key: username }
            - name: Loinc__Password
              valueFrom:
                secretKeyRef: { name: loinc-secret, key: password }
          volumeMounts:
            - { name: he-keys, mountPath: /app/public.key, subPath: public.key, readOnly: true }
            - { name: he-keys, mountPath: /app/secret.key, subPath: secret.key, readOnly: true }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
      volumes:
        - name: he-keys
          secret: { secretName: he-keys }
---
apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: hemedical
spec:
  selector: { app: client }
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: heserver
  namespace: hemedical
  labels: { app: heserver }
spec:
  replicas: 1
  selector:
    matchLabels: { app: heserver }
  template:
    metadata:
      labels: { app: heserver }
    spec:
      containers:
        - name: heserver
          image: ${IMAGE_REGISTRY}/hemedical-heserver:${IMAGE_TAG}
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            # No static proxy list: hospitals self-register and receive the
            # CKKS public key in the registration response.
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: heserver
  namespace: hemedical
spec:
  selector: { app: heserver }
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospitalproxy
  namespace: hemedical
  labels: { app: hospitalproxy }
spec:
  replicas: 1
  selector:
    matchLabels: { app: hospitalproxy }
  template:
    metadata:
      labels: { app: hospitalproxy }
    spec:
      containers:
        - name: hospitalproxy
          image: ${IMAGE_REGISTRY}/hemedical-hospitalproxy:${IMAGE_TAG}
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: UseHospitalBackend
              value: "true"
            - name: HospitalBaseUrl
              value: "http://hospital:8080"
            - name: FhirBaseUrl
              value: "https://hapi.fhir.org/baseR4"
            # Discovery + key distribution: registers with the HE Server and
            # receives the CKKS public key in the response — no key mount needed.
            - name: HEServerBaseUrl
              value: "http://heserver:8080"
            - name: ProxyPublicUrl
              value: "http://hospitalproxy:8080"
            - name: HospitalName
              value: "AKS Hospital"
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: hospitalproxy
  namespace: hemedical
spec:
  selector: { app: hospitalproxy }
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospital
  namespace: hemedical
  labels: { app: hospital }
spec:
  replicas: 1
  selector:
    matchLabels: { app: hospital }
  template:
    metadata:
      labels: { app: hospital }
    spec:
      containers:
        - name: hospital
          image: ${IMAGE_REGISTRY}/hemedical-hospital:${IMAGE_TAG}
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: Database__DefaultConnection
              valueFrom:
                secretKeyRef: { name: db-secret, key: connectionString }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: hospital
  namespace: hemedical
spec:
  selector: { app: hospital }
  ports:
    - port: 8080
      targetPort: 8080
