apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: hemedical
  labels: { app: frontend }
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: hemedical/hemedical-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests: { cpu: "20m", memory: "32Mi" }
            limits: { cpu: "200m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: hemedical
spec:
  selector: { app: frontend }
  ports:
    - port: 80
      targetPort: 80
